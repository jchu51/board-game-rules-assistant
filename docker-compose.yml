services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: local
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - api_node_modules:/app/node_modules
    command: npm run dev

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  api_node_modules:
  web_node_modules:
