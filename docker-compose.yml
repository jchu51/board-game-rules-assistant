services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: board_game_rules
      POSTGRES_USER: board_game_rules
      POSTGRES_PASSWORD: board_game_rules
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U board_game_rules -d board_game_rules"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://board_game_rules:board_game_rules@postgres:5432/board_game_rules
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules
    command: >-
      sh -c "npm run build -w @board-game-rules-assistant/rag-core &&
      npm run build -w @board-game-rules-assistant/agent-core &&
      npm run build -w @board-game-rules-assistant/database &&
      npm run dev -w api"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
    command: >-
      sh -c "npm run build -w @board-game-rules-assistant/rag-core &&
      npm run build -w @board-game-rules-assistant/agent-core &&
      npm run build -w @board-game-rules-assistant/database &&
      npm run dev -w web -- --host 0.0.0.0"

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
