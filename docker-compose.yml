services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: local
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules
      - /workspace/apps/api/node_modules
    command: sh -c "npm install && npm run dev -w api"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
      - /workspace/apps/web/node_modules
    command: sh -c "npm install && npm run dev -w web -- --host 0.0.0.0"

volumes:
  api_node_modules:
  web_node_modules:
