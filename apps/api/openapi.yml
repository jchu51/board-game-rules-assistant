openapi: 3.1.0
info:
  title: Board Game Rules Assistant API
  version: 1.0.0
  description: API for rulebook upload, indexing, and rules Q&A.
servers:
  - url: http://127.0.0.1:8000
    description: Local development
tags:
  - name: Conversations
    description: Durable actor-owned rules conversations
  - name: Health
    description: API health checks
  - name: Ingestion
    description: Rulebook upload and indexing
  - name: Retrieval
    description: Similarity search over indexed rulebook chunks
  - name: Admin Library
    description: Administrator-managed global rulebook publication
paths:
  /conversations:
    post:
      tags: [Conversations]
      summary: Create a conversation for one game
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConversationRequest" }
      responses:
        "201": { description: Conversation created, content: { application/json: { schema: { $ref: "#/components/schemas/Conversation" } } } }
    get:
      tags: [Conversations]
      summary: List the current actor's conversations
      responses:
        "200":
          description: Owned conversations
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Conversation" } }
  /conversations/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Conversations]
      summary: Get an owned conversation with ordered messages
      responses:
        "200": { description: Conversation detail, content: { application/json: { schema: { $ref: "#/components/schemas/ConversationDetail" } } } }
        "404": { description: Missing or not owned }
    delete:
      tags: [Conversations]
      summary: Delete an owned conversation
      responses:
        "204": { description: Deleted }
        "404": { description: Missing or not owned }
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns a basic status response for the API.
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /rulebooks:
    post:
      tags:
        - Ingestion
      summary: Create a rulebook from an uploaded PDF
      description: Uploads a PDF rulebook, indexes its extracted text, and creates an in-memory rulebook record for the current API process.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadRulebookRequest"
      responses:
        "200":
          description: Rulebook indexed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadRulebookResponse"
        "400":
          description: Invalid upload request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingFile:
                  value:
                    error: file is required
                invalidFileType:
                  value:
                    error: Only PDF files are allowed
                invalidSplitterParams:
                  value:
                    error: chunkOverlap must be less than chunkSize
        "413":
          description: File exceeds upload size limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                fileTooLarge:
                  value:
                    error: File exceeds the upload size limit
        "500":
          description: Unexpected ingestion failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags:
        - Ingestion
      summary: List indexed rulebooks
      description: Returns the in-memory rulebook records created by successful uploads during the current API process.
      responses:
        "200":
          description: Indexed rulebooks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRulebooksResponse"
        "500":
          description: Unexpected list failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rulebooks/{id}:
    delete:
      tags:
        - Ingestion
      summary: Delete an indexed rulebook from the list
      description: Removes the in-memory rulebook record. Vector-store deletion is not implemented yet.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Rulebook deleted
        "404":
          description: Rulebook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notFound:
                  value:
                    error: Rulebook not found
        "500":
          description: Unexpected delete failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /retrieval/search:
    post:
      tags:
        - Retrieval
      summary: Search indexed rulebook chunks
      description: Searches sources authorized for the actor and the selected conversation's canonical game, then durably stores the turn and citations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrievalSearchRequest"
      responses:
        "200":
          description: Matching rulebook chunks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalSearchResponse"
        "400":
          description: Invalid search request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingQuery:
                  value:
                    error: query is required
        "500":
          description: Unexpected retrieval failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/games/{gameId}/documents:
    post:
      tags: [Admin Library]
      summary: Ingest a global document version into the ready state
      parameters:
        - { name: gameId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/CreateGlobalDocumentRequest" }
      responses:
        "200": { description: Global version is ready for verification, content: { application/json: { schema: { $ref: "#/components/schemas/CreateGlobalDocumentResponse" } } } }
        "400": { description: Invalid upload request, content: { application/json: { schema: { $ref: "#/components/schemas/TypedErrorResponse" } } } }
        "403": { description: Administrator access required, content: { application/json: { schema: { $ref: "#/components/schemas/TypedErrorResponse" } } } }
  /admin/document-versions/{id}/verify:
    post:
      tags: [Admin Library]
      summary: Verify a ready global document version
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Version verified, content: { application/json: { schema: { $ref: "#/components/schemas/GlobalVersionResponse" } } } }
        "403": { description: Administrator access required, content: { application/json: { schema: { $ref: "#/components/schemas/TypedErrorResponse" } } } }
        "409": { description: Version is not ready, content: { application/json: { schema: { $ref: "#/components/schemas/TypedErrorResponse" } } } }
  /admin/document-versions/{id}/publish:
    post:
      tags: [Admin Library]
      summary: Atomically publish a verified global document version
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Version published, content: { application/json: { schema: { $ref: "#/components/schemas/GlobalVersionResponse" } } } }
        "403": { description: Administrator access required, content: { application/json: { schema: { $ref: "#/components/schemas/TypedErrorResponse" } } } }
        "409": { description: Version is not verified and ready, content: { application/json: { schema: { $ref: "#/components/schemas/TypedErrorResponse" } } } }
components:
  schemas:
    CreateConversationRequest:
      type: object
      required: [gameId, title]
      properties:
        gameId: { type: string, format: uuid }
        title: { type: string, minLength: 1, maxLength: 200 }
      additionalProperties: false
    Conversation:
      type: object
      required: [id, gameId, title, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        gameId: { type: string, format: uuid }
        userId: { type: [string, "null"], format: uuid }
        guestSessionId: { type: [string, "null"], format: uuid }
        title: { type: string }
        expiresAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        model: { type: [string, "null"] }
        citations: { type: array, items: { type: object } }
        createdAt: { type: string, format: date-time }
    ConversationDetail:
      allOf:
        - { $ref: "#/components/schemas/Conversation" }
        - type: object
          required: [messages]
          properties:
            messages: { type: array, items: { $ref: "#/components/schemas/Message" } }
    TypedErrorResponse:
      type: object
      required: [code]
      properties: { code: { type: string } }
    CreateGlobalDocumentRequest:
      type: object
      required: [title, kind, file]
      properties:
        title: { type: string, minLength: 1 }
        kind: { type: string, enum: [base_rules, expansion, errata, other] }
        documentId: { type: string, format: uuid, description: Existing global document for a replacement version }
        file: { type: string, format: binary }
    CreateGlobalDocumentResponse:
      type: object
      required: [document, version]
      properties:
        document: { type: object, additionalProperties: true }
        version: { type: object, additionalProperties: true }
    GlobalVersionResponse:
      type: object
      required: [id, status, verifiedAt, verifiedBy]
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [ready, published] }
        verifiedAt: { type: [string, "null"], format: date-time }
        verifiedBy: { type: [string, "null"], format: uuid }
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message.
        stack:
          type: string
          description: Development-only stack trace for unhandled errors.
      additionalProperties: false
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
          const: board-game-rules-assistant-api
      additionalProperties: false
    UploadRulebookRequest:
      type: object
      required:
        - gameName
        - file
      properties:
        gameName:
          type: string
          minLength: 1
          description: Board game name associated with the uploaded PDF.
          example: Catan
        file:
          type: string
          format: binary
          description: PDF rulebook file. The API accepts only `.pdf` files with `application/pdf` MIME type.
        chunkSize:
          type: integer
          minimum: 1
          description: Optional override for text splitter chunk size.
          example: 1000
        chunkOverlap:
          type: integer
          minimum: 0
          description: Optional override for text splitter chunk overlap. Must be less than `chunkSize` when both are provided.
          example: 150
      additionalProperties: false
    RulebookSummary:
      type: object
      required:
        - id
        - gameName
        - pdfName
        - fileSize
      properties:
        id:
          type: string
          format: uuid
          description: Server-generated rulebook identifier.
        gameName:
          type: string
          minLength: 1
          description: Board game name provided at upload time.
          example: Catan
        pdfName:
          type: string
          minLength: 1
          description: Original PDF filename.
          example: catan-rulebook.pdf
        fileSize:
          type: integer
          minimum: 0
          description: Uploaded file size in bytes.
          example: 1840000
      additionalProperties: false
    UploadRulebookResponse:
      type: object
      required:
        - id
        - gameName
        - pdfName
        - fileSize
        - status
        - documentCount
        - chunkCount
      properties:
        id:
          type: string
          format: uuid
          description: Server-generated rulebook identifier.
        gameName:
          type: string
          minLength: 1
          description: Board game name provided at upload time.
          example: Catan
        pdfName:
          type: string
          minLength: 1
          description: Original PDF filename.
          example: catan-rulebook.pdf
        fileSize:
          type: integer
          minimum: 0
          description: Uploaded file size in bytes.
          example: 1840000
        status:
          type: string
          const: completed
          description: Ingestion status for this synchronous upload request.
        documentCount:
          type: integer
          minimum: 0
          description: Number of page-level documents extracted from the PDF.
        chunkCount:
          type: integer
          minimum: 0
          description: Number of chunks indexed into the in-memory vector store.
      additionalProperties: false
    ListRulebooksResponse:
      type: object
      required:
        - rulebooks
      properties:
        rulebooks:
          type: array
          description: Rulebooks indexed during the current API process lifetime.
          items:
            $ref: "#/components/schemas/RulebookSummary"
      additionalProperties: false
    RetrievalSearchRequest:
      type: object
      required:
        - conversationId
        - query
      properties:
        conversationId:
          type: string
          format: uuid
          description: Client-generated identifier for the current chat thread.
          example: 11111111-1111-4111-8111-111111111111
        query:
          type: string
          minLength: 1
          description: Natural-language search query.
          example: How many resources does a city produce?
      additionalProperties: false
    RetrievalMatchMetadata:
      type: object
      properties:
        documentId:
          type: string
          format: uuid
          description: Rulebook id attached during upload.
        pageNumber:
          type: integer
          minimum: 1
          description: Source PDF page number when available.
        source:
          type: string
          description: Source PDF filename or public web URL when available.
          example: catan-rulebook.pdf
      additionalProperties: false
    RetrievalMatch:
      type: object
      required:
        - origin
        - content
        - metadata
      properties:
        origin:
          type: string
          enum:
            - rulebook
            - public_web
          description:
            Whether the match came from an indexed rulebook or public web
            search.
        content:
          type: string
          description: Retrieved chunk text.
        metadata:
          $ref: "#/components/schemas/RetrievalMatchMetadata"
      additionalProperties: false
    RetrievalSearchResponse:
      type: object
      required:
        - answer
        - matches
      properties:
        answer:
          type: string
          description: Agent-generated answer grounded in retrieved rulebook context.
        matches:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalMatch"
      additionalProperties: false
